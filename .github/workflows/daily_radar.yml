# file: .github/workflows/daily_radar.yml
name: ISI V5 Daily Risk Radar

on:
  schedule:
    # Berjalan otomatis setiap Senin-Jumat pukul 16:30 WIB
    # Waktu server GitHub adalah UTC. 16:30 WIB = 09:30 UTC
    - cron: '30 9 * * 1-5'
  
  # Mengizinkan eksekusi manual (tombol Run workflow)
  workflow_dispatch: 

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance

    - name: Inject Credentials to settings.json
      # Menulis settings.json secara aman di server (tidak tersimpan di repo publik)
      run: |
        mkdir -p config
        cat <<EOF > config/settings.json
        {
            "telegram": {
                "bot_token": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
                "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}"
            },
            "email": {
                "smtp_server": "smtp.gmail.com",
                "smtp_port": 587,
                "sender_email": "${{ secrets.SENDER_EMAIL }}",
                "sender_password": "${{ secrets.SENDER_PASSWORD }}"
            }
        }
        EOF

    - name: Execute Daily Risk Radar
      run: python run_daily_risk_radar.py