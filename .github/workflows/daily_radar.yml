name: Daily Risk Radar & Dashboard Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '30 9 * * *'

permissions:
  contents: write

jobs:
  run-daily-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Data Fetcher
        run: |
          python data_fetcher.py

      - name: Generate HTML Dashboard
        run: |
          python -m dashboard.generate_dashboard

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dashboard/data.json data_fetcher.py dashboard/generate_dashboard.py dashboard/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat: automated data pipeline with safe_float sanitization"
            git pull --rebase origin main
            git push
          fi