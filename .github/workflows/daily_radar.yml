name: Daily Risk Radar & Dashboard Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '30 9 * * *'

permissions:
  contents: write

jobs:
  run-daily-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests google-generativeai
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Data Fetcher
        run: |
          python scripts/data_fetcher.py

      - name: Generate Turnaround Watchlist
        run: |
          python scripts/generate_turnaround_watchlist.py

      - name: Generate Exit Watchlist
        run: |
          python scripts/generate_exit_watchlist.py

      - name: Run Daily Risk Radar (AI Narrative)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python run_daily_risk_radar.py

      - name: Copy Radar JSON to Dashboard Data
        run: |
          cp output/daily_radar_status.json dashboard/data/radar.json
          echo "radar.json copied ($(wc -c < output/daily_radar_status.json) bytes)"

      - name: Generate Market Data (Live IHSG/USDIDR via yfinance)
        run: |
          python gen_market.py

      - name: Rebuild data.js
        run: |
          python rebuild_data_js.py

      - name: Validate Market Pipeline
        run: |
          python scripts/validate_market_pipeline.py

      - name: Generate V3 HTML Dashboard
        run: |
          python scripts/generate_dashboard_v3.py

      - name: Generate HTML Dashboard V2
        run: |
          python scripts/generate_dashboard_v2.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dashboard/index.html dashboard/data/market.json dashboard/data/radar.json dashboard/data/data.js dashboard/data/backtest_monthly.json docs/index.html docs/data/ scripts/data_fetcher.py scripts/generate_turnaround_watchlist.py scripts/generate_exit_watchlist.py scripts/generate_dashboard_v2.py scripts/generate_dashboard_v3.py scripts/validate_market_pipeline.py run_daily_risk_radar.py gen_market.py rebuild_data_js.py data/ current/ database/historical/turnaround_history.csv output/daily_radar_status.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat: daily radar + pipeline V3 (market, data.js, validation)"
            git pull --rebase origin main
            git push
          fi