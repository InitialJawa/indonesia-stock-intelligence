# file: .github/workflows/monthly_pipeline.yml
name: ISI V4 Monthly Pipeline

on:
  schedule:
    # Berjalan otomatis setiap tanggal 1, jam 09:00 WIB
    # Waktu server GitHub adalah UTC. 09:00 WIB = 02:00 UTC
    - cron: '0 2 1 * *'

  # Mengizinkan eksekusi manual (tombol Run workflow)
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests

    - name: Inject Credentials to settings.json
      # Menulis settings.json secara aman di server (tidak tersimpan di repo publik)
      run: |
        mkdir -p config
        cat <<EOF > config/settings.json
        {
            "telegram": {
                "bot_token": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
                "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}"
            },
            "email": {
                "smtp_server": "smtp.gmail.com",
                "smtp_port": 587,
                "sender_email": "${{ secrets.SENDER_EMAIL }}",
                "sender_password": "${{ secrets.SENDER_PASSWORD }}"
            }
        }
        EOF

    - name: Execute Monthly Pipeline
      run: python run_monthly_pipeline.py

    - name: Commit & Push Output ke Repository
      # Menyimpan hasil scoring, dashboard, dan warehouse kembali ke repo
      # agar daily_radar.yml dapat membaca final_ranking_v3.json
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add output/scores/ dashboard/index.html database/ snapshots/ archives/
        git diff --staged --quiet || git commit -m "chore: monthly pipeline update $(date +'%Y-%m')"
        git push
